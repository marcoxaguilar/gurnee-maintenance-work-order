<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gurnee Maintenance — Work Orders</title>
<meta name="application-name" content="Gurnee Maintenance">
<meta name="apple-mobile-web-app-title" content="Gurnee Maintenance">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#557049">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F2E9; --bg-2:#FBFAF3; --panel:#FFFFFF; --panel-2:#F1EFE3; --panel-3:#EAE7D7;
  --line:#E0DCCB; --line-2:#D2CEBA;
  --ink:#34382C; --muted:#646856; --faint:#8B8E7C;
  --brand:#5E7C57; --brand-deep:#41603C; --brand-soft:#E8EFE2;
  --accent:#C2724E; --accent-deep:#A65A38; --accent-soft:#F3E2D6;
  --honey:#C08A2E; --honey-soft:#F6EBD2;
  --info:#5E80A6; --info-soft:#E1E9F2;
  --ok:#4F9163; --ok-soft:#DDEEE1;
  --urgent:#BD533C; --urgent-soft:#F6E0D9;
  --radius:18px; --radius-sm:12px;
  --shadow:0 8px 26px rgba(70,80,55,.10);
  --shadow-sm:0 3px 10px rgba(70,80,55,.08);
  --serif:'Fraunces',Georgia,serif;
  --sans:'Nunito Sans',-apple-system,system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);font-size:16.5px;line-height:1.5;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.5;
  background:radial-gradient(900px 520px at 92% -10%,rgba(94,124,87,.10),transparent 60%),radial-gradient(640px 460px at -5% 108%,rgba(194,114,78,.08),transparent 60%)}
button{font-family:var(--sans);cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:var(--sans);font-size:16px}
a{color:inherit}
.hidden{display:none!important}
:focus-visible{outline:3px solid var(--brand);outline-offset:2px;border-radius:6px}

/* leaf mark */
.leaf{width:38px;height:38px;border-radius:12px;background:linear-gradient(145deg,#6B8E5A,#4F6E48);display:grid;place-items:center;flex:none;box-shadow:var(--shadow-sm)}
.leaf svg{width:22px;height:22px}
.wordmark{display:flex;align-items:center;gap:12px}
.wordmark .nm{font-family:var(--serif);font-weight:600;letter-spacing:-.3px;line-height:1.05}
.wordmark .nm b{display:block;font-size:20px;color:var(--brand-deep)}
.wordmark .nm small{display:block;font-family:var(--sans);font-weight:700;font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent)}

/* ---------- AUTH ---------- */
#auth{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(1000px 620px at 50% -12%,rgba(94,124,87,.14),transparent 62%),var(--bg)}
.auth-card{width:100%;max-width:440px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:38px 34px;position:relative;overflow:hidden}
.auth-card::after{content:"";position:absolute;right:-40px;top:-40px;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(94,124,87,.10),transparent 70%)}
.auth-sub{color:var(--muted);font-size:15px;margin:14px 0 26px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:800;color:var(--muted);margin-bottom:7px;letter-spacing:.3px}
.field input,.field select,.field textarea{width:100%;background:var(--bg-2);border:1.5px solid var(--line-2);border-radius:var(--radius-sm);padding:13px 14px;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.field textarea{resize:vertical;line-height:1.5}
.seg{display:flex;gap:6px;margin-bottom:18px;background:var(--panel-2);padding:5px;border-radius:14px;border:1px solid var(--line)}
.seg button{flex:1;padding:12px;border-radius:10px;font-weight:800;font-size:14.5px;color:var(--muted);transition:.15s}
.seg button.on{background:var(--panel);color:var(--brand-deep);box-shadow:var(--shadow-sm)}
.btn{width:100%;padding:15px;border-radius:var(--radius-sm);font-weight:800;font-size:16px;transition:transform .08s,filter .15s,box-shadow .15s}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--brand);color:#fff;box-shadow:0 6px 16px rgba(94,124,87,.30)}
.btn-primary:hover{filter:brightness(1.04)}
.btn-accent{background:var(--accent);color:#fff;box-shadow:0 6px 16px rgba(194,114,78,.28)}
.btn-accent:hover{filter:brightness(1.04)}
.btn-ghost{background:var(--panel-2);color:var(--ink);border:1.5px solid var(--line-2)}
.btn-ghost:hover{background:var(--panel-3)}
.btn-danger{background:var(--urgent-soft);color:var(--accent-deep);border:1.5px solid #E6C3B6}
.auth-switch{text-align:center;margin-top:20px;font-size:15px;color:var(--muted)}
.auth-switch a{color:var(--brand-deep);font-weight:800;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.auth-err{background:var(--urgent-soft);border:1px solid #E6BCB0;color:var(--accent-deep);padding:11px 14px;border-radius:11px;font-size:14.5px;margin-bottom:16px;font-weight:600}
.fb-warn{margin-top:20px;font-size:12.5px;color:var(--faint);text-align:center;line-height:1.6}

/* ---------- SHELL ---------- */
#app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;gap:18px;padding:15px 24px;border-bottom:1px solid var(--line);background:rgba(251,250,243,.86);backdrop-filter:blur(10px);position:sticky;top:0;z-index:20;flex-wrap:wrap}
.nav{display:flex;gap:4px;margin-left:6px;flex-wrap:wrap}
.nav button{padding:11px 17px;border-radius:11px;font-weight:800;font-size:15px;color:var(--muted);transition:.15s}
.nav button:hover{color:var(--brand-deep);background:var(--brand-soft)}
.nav button.on{background:var(--brand-soft);color:var(--brand-deep)}
.spacer{flex:1;min-width:8px}
.who{display:flex;align-items:center;gap:10px;font-size:15px}
.who .name{font-weight:800}
.badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
.badge.admin{background:var(--accent-soft);color:var(--accent-deep)}
.badge.technician{background:var(--honey-soft);color:var(--honey)}
.badge.customer{background:var(--info-soft);color:var(--info)}
.icon-btn{padding:10px 15px;border-radius:11px;background:var(--panel);border:1.5px solid var(--line-2);font-size:14.5px;font-weight:800;color:var(--muted)}
.icon-btn:hover{color:var(--brand-deep);border-color:var(--brand)}
.main{flex:1;padding:26px 24px 90px;max-width:1520px;width:100%;margin:0 auto}
.view-title{display:flex;align-items:center;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.view-title h2{font-family:var(--serif);font-weight:600;font-size:30px;letter-spacing:-.5px;color:var(--brand-deep)}
.view-title .count{background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:5px 14px;border-radius:20px;font-size:14px;font-weight:800}
.view-title .sub{color:var(--muted);font-size:15px;width:100%}

/* ---------- BOARD ---------- */
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1100px){.board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.board{grid-template-columns:1fr}}
.col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:15px;min-height:220px;transition:background .15s,border-color .15s}
.col.dragover{background:var(--brand-soft);border-color:var(--brand);border-style:dashed}
.col-head{display:flex;align-items:center;gap:9px;margin-bottom:15px;padding-bottom:13px;border-bottom:1px solid var(--line)}
.col-head .dot{width:12px;height:12px;border-radius:50%}
.col-head h3{font-family:var(--serif);font-size:17px;font-weight:600}
.col-head .n{margin-left:auto;background:var(--panel-2);color:var(--muted);font-size:13px;font-weight:800;padding:3px 11px;border-radius:20px}
.col[data-st="new"] .dot{background:var(--brand)} .col[data-st="assigned"] .dot{background:var(--honey)}
.col[data-st="progress"] .dot{background:var(--info)} .col[data-st="done"] .dot{background:var(--ok)}

.card{background:var(--panel);border:1px solid var(--line-2);border-radius:14px;padding:14px;margin-bottom:12px;cursor:grab;position:relative;transition:transform .12s,box-shadow .12s,border-color .15s;border-left-width:5px;box-shadow:var(--shadow-sm)}
.card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.card.dragging{opacity:.4;cursor:grabbing}
.card .ctop{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:9px}
.card .cust-tag{font-size:12px;font-weight:800;padding:4px 11px;border-radius:20px;color:#fff;white-space:nowrap}
.card .flag{font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:7px;letter-spacing:.3px}
.flag.high{background:var(--urgent-soft);color:var(--urgent)} .flag.med{background:var(--brand-soft);color:var(--brand-deep)} .flag.low{background:var(--info-soft);color:var(--info)}
.card h4{font-size:16.5px;font-weight:800;line-height:1.3;margin-bottom:7px}
.card .items-mini{font-size:13.5px;color:var(--muted);margin-bottom:11px;line-height:1.45}
.card .cfoot{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.assignee{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--muted)}
.ava{width:24px;height:24px;border-radius:50%;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800}
.card .when{margin-left:auto;font-size:13px;color:var(--faint);font-weight:700}
.empty-col{text-align:center;color:var(--faint);font-size:14px;padding:34px 12px;border:2px dashed var(--line-2);border-radius:12px;line-height:1.5}

/* ---------- CALENDAR ---------- */
.cal-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.cal-bar h3{font-family:var(--serif);font-size:22px;font-weight:600;min-width:220px;color:var(--brand-deep)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
.cal-dow{text-align:center;font-size:12.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:6px 0}
.cal-cell{background:var(--panel);border:1px solid var(--line);border-radius:12px;min-height:116px;padding:8px;display:flex;flex-direction:column;gap:5px;transition:border-color .15s}
.cal-cell.other{opacity:.45}
.cal-cell.today{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.cal-cell .daynum{font-size:13px;font-weight:800;color:var(--muted)}
.cal-cell.today .daynum{color:var(--accent-deep)}
.cal-evt{font-size:12px;font-weight:700;padding:4px 8px;border-radius:7px;color:#fff;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-evt:hover{filter:brightness(1.1)}
.cal-more{font-size:11.5px;color:var(--faint);font-weight:800;padding-left:3px}
.legend{display:flex;flex-wrap:wrap;gap:10px 18px;margin-top:20px;padding:16px 18px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}
.legend .li{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted);font-weight:700}
.legend .sw{width:15px;height:15px;border-radius:5px}

/* ---------- LIST ---------- */
.wo-list{display:flex;flex-direction:column;gap:12px}
.wo-row{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:17px 19px;display:flex;align-items:center;gap:15px;border-left-width:5px;box-shadow:var(--shadow-sm);cursor:pointer;transition:box-shadow .12s,transform .12s}
.wo-row:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.wo-row .grow{flex:1;min-width:0}
.wo-row h4{font-size:17px;font-weight:800;margin-bottom:5px}
.wo-row .sub{font-size:14px;color:var(--muted)}

/* ---------- TABLE (techs / inventory) ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.panel-head{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.panel-head h3{font-family:var(--serif);font-size:19px;font-weight:600}
.panel-head .right{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search{background:var(--bg-2);border:1.5px solid var(--line-2);border-radius:11px;padding:10px 14px;min-width:200px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:12.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:13px 18px;border-bottom:1px solid var(--line);background:var(--panel-2)}
td{padding:14px 18px;border-bottom:1px solid var(--line);font-size:15px}
tr:last-child td{border-bottom:none}
tr.low td{background:var(--urgent-soft)}
.qty-badge{font-weight:800}
.qty-badge.low{color:var(--urgent)}
.tag{display:inline-block;font-size:12px;font-weight:800;padding:3px 10px;border-radius:20px;background:var(--panel-2);color:var(--muted)}
.lowpill{font-size:11.5px;font-weight:800;color:var(--urgent);background:#fff;border:1px solid #E6C3B6;padding:2px 8px;border-radius:20px}
.row-act{display:flex;gap:6px;justify-content:flex-end}
.mini-btn{padding:7px 12px;border-radius:9px;font-size:13.5px;font-weight:800;background:var(--panel-2);border:1px solid var(--line-2);color:var(--muted)}
.mini-btn:hover{color:var(--brand-deep);border-color:var(--brand)}
.mini-btn.danger:hover{color:var(--accent-deep);border-color:var(--accent)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.tech-card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow-sm);display:flex;flex-direction:column;gap:10px}
.tech-card .ava{width:46px;height:46px;font-size:18px}
.tech-card h4{font-size:18px;font-weight:800}
.tech-card .ct{font-size:14px;color:var(--muted)}
.tech-card .stat{font-size:13px;color:var(--brand-deep);font-weight:800}

/* status pills */
.status-pill{font-size:12px;font-weight:800;padding:4px 11px;border-radius:20px;letter-spacing:.3px}
.status-pill.new{background:var(--brand-soft);color:var(--brand-deep)}
.status-pill.assigned{background:var(--honey-soft);color:var(--honey)}
.status-pill.progress{background:var(--info-soft);color:var(--info)}
.status-pill.done{background:var(--ok-soft);color:var(--ok)}

/* ---------- MODAL ---------- */
.modal-bg{position:fixed;inset:0;z-index:60;background:rgba(52,56,44,.45);backdrop-filter:blur(4px);display:flex;align-items:flex-start;justify-content:center;padding:38px 16px;overflow-y:auto}
.modal{width:100%;max-width:640px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;animation:pop .18s ease}
@keyframes pop{from{transform:translateY(12px) scale(.985);opacity:0}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line);background:var(--panel-2)}
.modal-head h3{font-family:var(--serif);font-size:21px;font-weight:600;color:var(--brand-deep)}
.modal-head .x{font-size:24px;color:var(--muted);width:36px;height:36px;border-radius:10px;display:grid;place-items:center}
.modal-head .x:hover{background:var(--panel-3);color:var(--ink)}
.modal-body{padding:24px;max-height:66vh;overflow-y:auto}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:15px}
@media(max-width:560px){.row2{grid-template-columns:1fr}}
.modal-foot{padding:17px 24px;border-top:1px solid var(--line);display:flex;gap:11px;justify-content:flex-end;background:var(--panel-2);flex-wrap:wrap}
.modal-foot .btn{width:auto;padding:13px 24px}

/* item builder */
.builder{background:var(--bg-2);border:1.5px solid var(--line-2);border-radius:14px;padding:15px;margin-top:4px}
.add-row{display:flex;gap:9px}
.add-row select{flex:1}
.add-row button{padding:0 20px;border-radius:11px;background:var(--brand);color:#fff;font-weight:800;font-size:22px;line-height:1}
.chips{display:flex;flex-direction:column;gap:8px;margin-top:13px}
.chip{display:flex;align-items:center;gap:11px;background:var(--panel);border:1px solid var(--line-2);border-radius:11px;padding:10px 13px;font-size:15px}
.chip .qty{width:60px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:8px;padding:7px;color:var(--ink);text-align:center;font-weight:800}
.chip .nm{flex:1;font-weight:700}
.chip .price{width:96px;background:var(--bg-2);border:1px solid var(--line-2);border-radius:8px;padding:7px 9px;color:var(--ink);font-weight:700}
.chip .rm{color:var(--faint);font-size:20px;padding:0 4px}
.chip .rm:hover{color:var(--urgent)}
.empty-mini{font-size:14px;color:var(--faint);text-align:center;padding:16px}

.sec{margin-bottom:20px}
.sec .lbl{font-size:12.5px;font-weight:800;letter-spacing:.5px;color:var(--faint);margin-bottom:8px;text-transform:uppercase}
.sec .val{font-size:16px;line-height:1.55}
.detail-items{list-style:none}
.detail-items li{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line);font-size:15.5px}
.detail-items li .q{color:var(--muted);font-weight:800}
.pill-row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

.fab{position:fixed;bottom:28px;right:28px;z-index:30;background:var(--accent);color:#fff;border-radius:50px;padding:17px 26px;font-weight:800;font-size:16.5px;box-shadow:0 10px 26px rgba(194,114,78,.40);display:flex;align-items:center;gap:9px;transition:transform .1s}
.fab:active{transform:scale(.96)}
.fab .plus{font-size:22px;line-height:1}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:80;background:var(--brand-deep);color:#fff;padding:14px 24px;border-radius:12px;font-weight:800;font-size:15px;box-shadow:var(--shadow);opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
.loading{position:fixed;inset:0;z-index:90;display:grid;place-items:center;background:var(--bg)}
.spinner{width:40px;height:40px;border:3px solid var(--line-2);border-top-color:var(--brand);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.color-preview{width:24px;height:24px;border-radius:7px;border:1px solid var(--line-2)}
.help{font-size:13.5px;color:var(--muted);margin-top:6px;line-height:1.5}

/* searchable customer dropdown */
.combo{position:relative}
.combo-list{position:absolute;left:0;right:0;top:calc(100% + 4px);background:var(--panel);border:1.5px solid var(--line-2);border-radius:12px;box-shadow:var(--shadow);max-height:220px;overflow-y:auto;z-index:5}
.combo-list .opt{padding:11px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;border-bottom:1px solid var(--line)}
.combo-list .opt:last-child{border-bottom:none}
.combo-list .opt:hover,.combo-list .opt.active{background:var(--brand-soft)}
.combo-list .opt .sw{width:14px;height:14px;border-radius:4px;flex:none}
.combo-list .opt.add{color:var(--accent-deep);font-weight:800}

/* request category + items */
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.cat-tab{padding:10px 16px;border-radius:11px;font-weight:800;font-size:14.5px;background:var(--panel);border:1.5px solid var(--line-2);color:var(--muted)}
.cat-tab.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.item-opts{display:flex;flex-wrap:wrap;gap:8px}
.item-opt{padding:9px 14px;border-radius:20px;font-weight:700;font-size:14px;background:var(--bg-2);border:1.5px solid var(--line-2);color:var(--ink)}
.item-opt:hover{border-color:var(--brand)}
.item-opt.picked{background:var(--brand-soft);border-color:var(--brand);color:var(--brand-deep)}
.item-opt.picked::before{content:"✓ ";font-weight:900}

/* ============================================================

// Work-order request categories (trades) → the items under each.

  { key:"lindenhurst",  label:"Lindenhurst",  color:"#5CA35C" },
  { key:"marling",      label:"Marling",      color:"#2C2C2C" },
  { key:"jj",           label:"JJ",           color:"#264C8A" },
  { key:"chef paul",    label:"Chef Paul",    color:"#8A4FB0" },
  { key:"gi alliance",  label:"GI Alliance",  color:"#2E6B3A" }
];
const DEFAULT_COLOR = "#7C8A6A"; // sage — non-recurring / unmatched

const PRIORITIES = [
  { id:"high", label:"Urgent" },
  { id:"med",  label:"Normal" },
  { id:"low",  label:"When convenient" }
];
const STATUSES = [
  { id:"new",      label:"New Request" },
  { id:"assigned", label:"Assigned" },
  { id:"progress", label:"In Progress" },
  { id:"done",     label:"Completed" }
];
const DEFAULT_TAX = 8.0; // % — Gurnee/Lake County-ish default; editable per invoice

/* ============================================================
   STATE
   ============================================================ */
let fb=null,db=null,auth=null,FB_OK=false;
let me=null, orders=[], techs=[], inventory=[], customers=[];
let unsubO=null,unsubT=null,unsubI=null,unsubC=null;
let currentView="queue", authMode="login", authRole="customer", staffRole="admin";
let editorState=null, invoiceState=null, calRef=new Date();

/* ---------- GOOGLE PLACES ---------- */
let GMAPS_READY=false;
function loadGooglePlaces(){
  if(!GOOGLE_MAPS_API_KEY){ return; }
  if(document.getElementById("gmapsScript")) return;
  const s=document.createElement("script");
  s.id="gmapsScript";
  s.src="https://maps.googleapis.com/maps/api/js?key="+encodeURIComponent(GOOGLE_MAPS_API_KEY)+"&libraries=places";
  s.async=true; s.defer=true;
  s.onload=()=>{ GMAPS_READY=true; };
  s.onerror=()=>{ console.warn("Google Maps failed to load — falling back to plain address."); };
  document.head.appendChild(s);
}
function attachAddressAutocomplete(inputId){
  if(!GMAPS_READY || !window.google || !google.maps || !google.maps.places) return;
  const el=document.getElementById(inputId); if(!el)return;
  const ac=new google.maps.places.Autocomplete(el,{types:["address"],componentRestrictions:{country:"us"},fields:["formatted_address"]});
  ac.addListener("place_changed",()=>{ const p=ac.getPlace(); if(p&&p.formatted_address){ el.value=p.formatted_address; if(editorState)editorState.address=p.formatted_address; } });
}

/* ---------- INIT ---------- */
try{
  if(firebaseConfig.apiKey!=="REPLACE_ME"){
    fb=firebase.initializeApp(firebaseConfig);
    auth=firebase.auth(); db=firebase.firestore(); FB_OK=true;
  }
}catch(e){ console.error(e); FB_OK=false; }

window.addEventListener("DOMContentLoaded",()=>{
  document.getElementById("loading").classList.add("hidden");
  setupPWA();
  loadGooglePlaces();
  if(!FB_OK){
    document.getElementById("fbWarn").textContent="⚠ Demo mode — data stays in this browser only. Add your Firebase keys at the top of the file to go live.";
    initDemo();
    const s=localStorage.getItem("gm_session");
    if(s){ me=JSON.parse(s); enterApp(); } else showAuth();
  }else{
    auth.onAuthStateChanged(async u=>{ if(u){ await loadProfile(u); enterApp(); } else showAuth(); });
  }
});

/* ---------- INSTALLABLE APP (PWA) ----------
   Uses real manifest.json + sw.js files at the site root (deploy them flat alongside index.html).
   Gives the phone the leaf icon + "Gurnee Maintenance" name. */
function setupPWA(){
  // Minimal service worker from a real file at the site root (required for Android's "Install app").
  if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  }
}

        items:items.map(n=>({name:n,qty:1,price:0})),schedule:d.toISOString().slice(0,10),notes:notes||"",
        assigneeName:assignee||"",createdBy:"demo",createdByName:c,role:"customer",order:0,ts:Date.now()+day};
    };
    localStorage.setItem("gm_orders",JSON.stringify([
      o("Front beds need spring cleanup","Libertyville Garden Club","med","new",["Garden Bed Cleanup","Mulch Install"],1,"","Gate code 4417. Roses along the east fence — please be gentle."),
      o("Lawn looking patchy by driveway","Margaret Ellison","low","new",["Lawn Mowing","Grass Seed (Sun & Shade)"],3,""),
      o("Hedges overgrown along walkway","Grayslake Office Park","high","assigned",["Hedge / Shrub Trimming","Leaf Removal"],0,"Fred"),
      o("Gutter overflowing in back","350","high","progress",["Gutter Cleaning"],-1,"Fred"),
      o("Seasonal planters refresh","Chef Paul","med","done",["Seasonal Color Swap","Planting / Bedding"],-4,"Fred")
    ]));

}

/* ============================================================
   AUTH
   ============================================================ */
function setAuthRole(r){ authRole=r;
  document.getElementById("rCust").classList.toggle("on",r==="customer");
  document.getElementById("rStaff").classList.toggle("on",r==="staff");
  document.getElementById("staffRole").classList.toggle("hidden",r!=="staff");
}
function setStaffRole(r){ staffRole=r;
  document.getElementById("rAdmin").classList.toggle("on",r==="admin");
  document.getElementById("rTech").classList.toggle("on",r==="technician");
}
function effectiveRole(){ return authRole==="customer"?"customer":staffRole; }
function toggleMode(){
  authMode=authMode==="login"?"signup":"login";
  const su=authMode==="signup";
  document.getElementById("signupName").classList.toggle("hidden",!su);
  document.getElementById("authBtn").textContent=su?"Create Account":"Log In";
  document.getElementById("switchTxt").textContent=su?"Already have an account?":"New here?";
  document.getElementById("switchLink").textContent=su?"Log in":"Create an account";
  document.getElementById("authErr").classList.add("hidden");
}
function authError(m){ const e=document.getElementById("authErr"); e.textContent=m; e.classList.remove("hidden"); }
function showAuth(){ document.getElementById("auth").classList.remove("hidden"); document.getElementById("app").classList.add("hidden"); document.getElementById("fab").classList.add("hidden"); }

async function doAuth(){
  const email=document.getElementById("authEmail").value.trim();
  const pass=document.getElementById("authPass").value;
  const name=document.getElementById("suName").value.trim();
  let role=effectiveRole();
  // Lock admin to the two approved emails. Any other "staff" signup is a technician.
  if(role==="admin" && !isAdminEmail(email)) role="technician";
  if(role!=="customer" && isAdminEmail(email)) role="admin";
  if(!email||!pass) return authError("Please enter your email and password.");
  if(authMode==="signup"&&!name) return authError("Please enter your name.");
  if(!FB_OK){
    me={uid:"demo-"+email,email,name:name||email.split("@")[0],role};
    localStorage.setItem("gm_session",JSON.stringify(me));
    enterApp(); return;
  }
  try{
    if(authMode==="signup"){
      const cred=await auth.createUserWithEmailAndPassword(email,pass);
      await db.collection("users").doc(cred.user.uid).set({name,email,role,ts:Date.now()});
    }else{ await auth.signInWithEmailAndPassword(email,pass); }
  }catch(e){ authError(prettyAuthErr(e.code||e.message||"")); }
}
function prettyAuthErr(c){
  if(c.includes("email-already"))return"That email is already registered — try logging in.";
  if(c.includes("wrong-password")||c.includes("invalid-credential"))return"Wrong email or password.";
  if(c.includes("user-not-found"))return"No account found — create one first.";
  if(c.includes("weak-password"))return"Password must be at least 6 characters.";
  if(c.includes("invalid-email"))return"That email address looks invalid.";
  return"Sorry, couldn't sign in. "+c;
}
async function loadProfile(u){
  let d=await db.collection("users").doc(u.uid).get();
  if(!d.exists){ await db.collection("users").doc(u.uid).set({name:u.email.split("@")[0],email:u.email,role:"customer",ts:Date.now()}); d=await db.collection("users").doc(u.uid).get(); }
  const x=d.data();
  let role=x.role;
  // Enforce the admin allowlist no matter what the stored doc says.
  if(isAdminEmail(u.email)) role="admin";
  else if(role==="admin") role="technician"; // someone wrongly stored as admin gets demoted
  if(role!==x.role){ try{ await db.collection("users").doc(u.uid).set({role},{merge:true}); }catch(_){ } }
  me={uid:u.uid,email:u.email,name:x.name,role,businessName:x.businessName||"",businessId:x.businessId||""};
}
function logout(){
  [unsubO,unsubT,unsubI,unsubC].forEach(f=>f&&f()); unsubO=unsubT=unsubI=unsubC=null;
  if(FB_OK) auth.signOut(); else{ localStorage.removeItem("gm_session"); me=null; showAuth(); }
}

/* ============================================================
   ENTER APP
   ============================================================ */
function myTechRecord(){ return techs.find(t=>t.name===me.name || (t.email&&me.email&&t.email.toLowerCase()===me.email.toLowerCase())); }
function canCreateOrders(){
  if(me.role==="admin") return true;
  if(me.role==="technician"){ const t=myTechRecord(); return !!(t&&t.trusted); }
  return me.role==="customer"; // customers create their own requests
}
function enterApp(){
  document.getElementById("auth").classList.add("hidden");
  document.getElementById("app").classList.remove("hidden");
  document.getElementById("whoName").textContent = me.role==="customer" && me.businessName ? me.businessName : me.name;
  const b=document.getElementById("whoBadge");
  b.textContent={admin:"Admin",technician:"Technician",customer:"Customer"}[me.role];
  b.className="badge "+me.role;
  document.getElementById("fabLbl").textContent=me.role==="customer"?"New Request":"New Work Order";
  buildNav();
  currentView = me.role==="customer"?"mine" : me.role==="technician"?"mytasks" : "queue";
  subscribeAll();
}
// businesses this customer's email is approved to join
function approvedBusinessesFor(email){
  const e=(email||"").toLowerCase();
  return customers.filter(c=>(c.authedEmails||[]).map(x=>x.toLowerCase()).includes(e));
}
// Returns true if a customer still needs to pick/confirm their business.
function customerNeedsBinding(){ return me.role==="customer" && !me.businessName; }
// Show the gate (block, single-confirm, or choose) after customers + we know the email
function renderCustomerGate(){
  const m=document.getElementById("main"); m.innerHTML="";
  document.getElementById("fab").classList.add("hidden");
  const opts=approvedBusinessesFor(me.email);
  let body;
  if(!opts.length){
    body=`<div class="empty-col" style="padding:48px;max-width:520px;margin:0 auto;line-height:1.6">
      <div style="font-size:40px;margin-bottom:8px">🌿</div>
      <h3 style="font-family:var(--serif);font-size:22px;color:var(--brand-deep);margin-bottom:10px">Almost there!</h3>
      Your email <b>${esc(me.email)}</b> isn't approved for a business yet.<br>
      Please ask Gurnee Maintenance to add your email to your business, then log out and back in.
      <div style="margin-top:20px"><button class="btn btn-ghost" style="width:auto;padding:12px 22px" onclick="logout()">Log out</button></div></div>`;
  }else{
    const cards=opts.map(c=>`<button class="wo-row" style="border-left-color:${c.color||DEFAULT_COLOR};width:100%;text-align:left;cursor:pointer;border:1px solid var(--line);border-left-width:5px" onclick="bindBusiness('${c.id}')">
        <span class="sw" style="width:20px;height:20px;border-radius:6px;background:${c.color||DEFAULT_COLOR};flex:none"></span>
        <div class="grow"><h4>${esc(c.name)}</h4><div class="sub">Tap to continue as this business</div></div></button>`).join("");
    body=`<div style="max-width:560px;margin:0 auto">
      <div class="view-title" style="display:block"><h2>Which business are you with?</h2>
        <div class="sub">Choose your business to finish setting up your account.</div></div>
      <div class="wo-list">${cards}</div>
      <div style="margin-top:18px"><button class="btn btn-ghost" style="width:auto;padding:12px 22px" onclick="logout()">Log out</button></div></div>`;
  }
  m.innerHTML=body;
}
async function bindBusiness(custId){
  const c=customers.find(x=>x.id===custId); if(!c)return;
  // double-check approval server-truth side
  if(!(c.authedEmails||[]).map(x=>x.toLowerCase()).includes((me.email||"").toLowerCase())) return toast("That business isn't approved for your email.");
  me.businessName=c.name; me.businessId=c.id;
  if(!FB_OK){ localStorage.setItem("gm_session",JSON.stringify(me)); }
  else { try{ await db.collection("users").doc(me.uid).set({businessName:c.name,businessId:c.id},{merge:true}); }catch(_){ } }
  document.getElementById("whoName").textContent=c.name;
  toast("Welcome, "+c.name+" 🌿");
  buildNav(); currentView="mine"; refreshFab(); render();
}
function buildNav(){
  const nav=document.getElementById("nav"); nav.innerHTML="";
  const tabs = me.role==="admin"
    ? [["queue","Work Queue"],["calendar","Calendar"],["all","All Orders"],["toinvoice","To Invoice"],["customers","Customers"],["techs","Team"],["inventory","Inventory"]]
    : me.role==="technician"
    ? [["mytasks","My Tasks"],["calendar","Calendar"]]
    : [["mine","My Requests"]];
  tabs.forEach(([id,label])=>{ const btn=document.createElement("button"); btn.textContent=label; btn.dataset.v=id; btn.onclick=()=>{currentView=id;render();}; nav.appendChild(btn); });
}
function refreshFab(){
  const fab=document.getElementById("fab");
  fab.classList.toggle("hidden", !canCreateOrders() || customerNeedsBinding());
  document.getElementById("fabLbl").textContent=me.role==="customer"?"New Request":"New Work Order";
}

/* ============================================================

function custColor(n){
  if(!n) return DEFAULT_COLOR;
  const exact=customers.find(c=>c.name && c.name.toLowerCase()===n.toLowerCase());
  if(exact&&exact.color) return exact.color;
  const x=n.toLowerCase();
  const h=CUSTOMER_COLORS.find(c=>x.includes(c.key));
  return h?h.color:DEFAULT_COLOR;
}

function stLabel(s){ return STATUSES.find(x=>x.id===s)?.label||s; }
function initials(n){ return (n||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }

function renderBoard(m,onlyMine){
  let data = orders.slice();
  if(onlyMine) data=data.filter(o=>(o.assigneeName||"")===me.name);
  const wrap=document.createElement("div");
  wrap.innerHTML=`<div class="view-title"><h2>${onlyMine?"My Tasks":"Work Queue"}</h2><span class="count">${data.length} orders</span>
    <div class="sub">${onlyMine?"Jobs assigned to you. Drag a card to update its status.":"New customer requests land in <b>New Request</b>. Drag cards across to assign, start, and complete."}</div></div>`;
  const board=document.createElement("div"); board.className="board";
  STATUSES.forEach(st=>{
    const list=data.filter(o=>o.status===st.id).sort((a,b)=>(a.order??0)-(b.order??0));
    const col=document.createElement("div"); col.className="col"; col.dataset.st=st.id;
    col.innerHTML=`<div class="col-head"><span class="dot"></span><h3>${st.label}</h3><span class="n">${list.length}</span></div>`;
    const body=document.createElement("div"); body.className="col-body";
    if(!list.length) body.innerHTML=`<div class="empty-col">${st.id==="new"?"No new requests 🌱":"Drag work orders here"}</div>`;
    list.forEach(o=>body.appendChild(cardEl(o)));
    col.appendChild(body); setupDrop(col,body,st.id); board.appendChild(col);
  });
  wrap.appendChild(board); m.appendChild(wrap);
}
function cardEl(o){
  const c=document.createElement("div"); c.className="card"; c.draggable=true; c.dataset.id=o.id;
  c.style.borderLeftColor=custColor(o.customer);
  const itemsTxt=(o.items||[]).map(i=>i.name).slice(0,3).join(" · ")+((o.items||[]).length>3?" …":"");
  const assignee=o.assigneeName?`<span class="assignee"><span class="ava">${initials(o.assigneeName)}</span>${o.assigneeName}</span>`:`<span class="assignee" style="color:var(--faint)">Unassigned</span>`;
  c.innerHTML=`
    <div class="ctop"><span class="cust-tag" style="background:${custColor(o.customer)}">${esc(o.customer||"—")}</span>
      <span class="flag ${o.priority}">${priLabel(o.priority)}</span></div>
    <h4>${esc(o.title)}</h4>
    <div class="items-mini">${esc(itemsTxt)||"No items"}</div>
    <div class="cfoot">${assignee}<span class="when">${fmtDate(o.schedule)}</span></div>`;
  c.onclick=()=>{ if(!c.classList.contains("dragging")) openDetail(o.id); };
  c.addEventListener("dragstart",e=>{ c.classList.add("dragging"); e.dataTransfer.setData("text/plain",o.id); e.dataTransfer.effectAllowed="move"; });
  c.addEventListener("dragend",()=>c.classList.remove("dragging"));
  return c;
}
function setupDrop(col,body,status){
  col.addEventListener("dragover",e=>{ e.preventDefault(); col.classList.add("dragover");
    const dragging=document.querySelector(".card.dragging"); if(!dragging)return;
    const empty=body.querySelector(".empty-col"); if(empty)empty.remove();
    const after=getDragAfter(body,e.clientY); if(after==null)body.appendChild(dragging); else body.insertBefore(dragging,after);
  });
  col.addEventListener("dragleave",e=>{ if(!col.contains(e.relatedTarget))col.classList.remove("dragover"); });
  col.addEventListener("drop",async e=>{ e.preventDefault(); col.classList.remove("dragover");
    const id=e.dataTransfer.getData("text/plain");
    const ids=[...body.querySelectorAll(".card")].map(c=>c.dataset.id);
    const movedOrder=orders.find(o=>o.id===id);
    // Moving into "Completed" with no completion data yet → open the wrap-up form first.
    if(status==="done" && movedOrder && movedOrder.status!=="done" && !movedOrder.completion){
      render(); // snap card back; we'll set status after the form is filled
      openCompletion(id);
      return;
    }
    const moved=orders.find(o=>o.id===id); if(moved)moved.status=status;
    for(let i=0;i<ids.length;i++){ const o=orders.find(x=>x.id===ids[i]); if(!o)continue; const patch={order:i}; if(o.id===id)patch.status=status; o.order=i; await patchOrder(ids[i],patch); }
    if(!FB_OK)render(); toast("Status updated");
  });
}
function getDragAfter(c,y){ const els=[...c.querySelectorAll(".card:not(.dragging)")]; return els.reduce((cl,ch)=>{const b=ch.getBoundingClientRect();const off=y-b.top-b.height/2;return off<0&&off>cl.offset?{offset:off,element:ch}:cl;},{offset:-Infinity}).element; }

function renderCalendar(m){
  let data=orders.slice(); if(me.role==="technician")data=data.filter(o=>(o.assigneeName||"")===me.name);
  const month=calRef.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const wrap=document.createElement("div");
  wrap.innerHTML=`<div class="view-title"><h2>Schedule</h2></div>
    <div class="cal-bar"><button class="icon-btn" onclick="calNav(-1)">‹ Prev</button><h3>${month}</h3>
      <button class="icon-btn" onclick="calNav(1)">Next ›</button><button class="icon-btn" onclick="calToday()">Today</button></div>`;
  const grid=document.createElement("div"); grid.className="cal-grid";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(d=>{const h=document.createElement("div");h.className="cal-dow";h.textContent=d;grid.appendChild(h);});
  const y=calRef.getFullYear(),mo=calRef.getMonth(),startDow=new Date(y,mo,1).getDay();
  const todayIso=new Date().toISOString().slice(0,10), start=new Date(y,mo,1-startDow);
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i); const iso=d.toISOString().slice(0,10);
    const cell=document.createElement("div"); cell.className="cal-cell"+(d.getMonth()!==mo?" other":"")+(iso===todayIso?" today":"");
    cell.innerHTML=`<div class="daynum">${d.getDate()}</div>`;
    const day=data.filter(o=>o.schedule===iso);
    day.slice(0,3).forEach(o=>{ const ev=document.createElement("div"); ev.className="cal-evt"; ev.style.background=custColor(o.customer); ev.textContent=`${o.customer||"—"}: ${o.title}`; ev.onclick=()=>openDetail(o.id); cell.appendChild(ev); });
    if(day.length>3){const more=document.createElement("div");more.className="cal-more";more.textContent=`+${day.length-3} more`;cell.appendChild(more);}
    grid.appendChild(cell);
  }
  wrap.appendChild(grid);
  const leg=document.createElement("div"); leg.className="legend";
  CUSTOMER_COLORS.forEach(c=>{const li=document.createElement("div");li.className="li";li.innerHTML=`<span class="sw" style="background:${c.color}"></span>${c.label}`;leg.appendChild(li);});
  const li=document.createElement("div");li.className="li";li.innerHTML=`<span class="sw" style="background:${DEFAULT_COLOR}"></span>Other / one-off`;leg.appendChild(li);
  wrap.appendChild(leg); m.appendChild(wrap);
}
function calNav(n){ calRef.setMonth(calRef.getMonth()+n); render(); }
function calToday(){ calRef=new Date(); render(); }

function findCategoryFor(item){
  for(const [cat,arr] of Object.entries(REQUEST_CATEGORIES)) if(arr.some(x=>x.toLowerCase()===(item||"").toLowerCase())) return cat;

/* ---- searchable customer dropdown ---- */
let custComboActive=-1;
function custComboFilter(q){
  const list=document.getElementById("custList"); if(!list)return;
  const term=(q||"").toLowerCase().trim();
  const matches=customers.filter(c=>c.name.toLowerCase().includes(term)).sort((a,b)=>a.name.localeCompare(b.name)).slice(0,8);
  let html=matches.map((c,i)=>`<div class="opt" data-name="${esc(c.name)}" onmousedown="custComboPick('${esc(c.name).replace(/'/g,"\\'")}')"><span class="sw" style="background:${c.color||DEFAULT_COLOR}"></span>${esc(c.name)}${c.contact?` <span style="color:var(--faint);font-size:13px">· ${esc(c.contact)}</span>`:""}</div>`).join("");
  const exact=customers.some(c=>c.name.toLowerCase()===term);
  if(term && !exact) html+=`<div class="opt add" onmousedown="custComboAddNew('${esc(q).replace(/'/g,"\\'")}')">+ Add “${esc(q)}” as a new customer</div>`;
  if(!html){ list.style.display="none"; return; }
  list.innerHTML=html; list.style.display="block"; custComboActive=-1;
}
function custComboPick(name){
  document.getElementById("eCust").value=name; document.getElementById("custList").style.display="none";
  editorState.customer=name;
  const c=getCustomer(name);
  if(c&&c.contact&&!document.getElementById("eContact").value) document.getElementById("eContact").value=c.contact;
}
function custComboAddNew(name){
  document.getElementById("custList").style.display="none";
  openQuickCustomer(name);
}
function custComboKey(e){
  const list=document.getElementById("custList"); if(!list||list.style.display==="none")return;
  const opts=[...list.querySelectorAll(".opt")];
  if(e.key==="ArrowDown"){ e.preventDefault(); custComboActive=Math.min(opts.length-1,custComboActive+1); }
  else if(e.key==="ArrowUp"){ e.preventDefault(); custComboActive=Math.max(0,custComboActive-1); }
  else if(e.key==="Enter"){ if(custComboActive>=0&&opts[custComboActive]){ e.preventDefault(); opts[custComboActive].dispatchEvent(new Event("mousedown")); } return; }
  else if(e.key==="Escape"){ list.style.display="none"; return; }
  opts.forEach((o,i)=>o.classList.toggle("active",i===custComboActive));
}

    contact:(document.getElementById("eContact")?.value||"").trim(),

async function commitQuickCustomer(){

let editorCatOpen=null;
function editorPickCat(cat){
  editorCatOpen=cat;
  document.querySelectorAll("#catTabs .cat-tab").forEach(b=>b.classList.toggle("on",b.dataset.cat===cat));
  const wrap=document.getElementById("itemOpts"); if(!wrap)return;
  const picked=new Set(editorState.requests.filter(r=>r.category===cat).map(r=>r.item));
  wrap.innerHTML=REQUEST_CATEGORIES[cat].map(item=>`<button type="button" class="item-opt ${picked.has(item)?"picked":""}" onclick="toggleReq('${cat}','${item.replace(/'/g,"\\'")}')">${esc(item)}</button>`).join("");
}
function toggleReq(cat,item){
  const idx=editorState.requests.findIndex(r=>r.category===cat&&r.item===item);
  if(idx>=0) editorState.requests.splice(idx,1);
  else editorState.requests.push({category:cat,item});
  editorPickCat(cat); renderReqBubbles();
}
function renderReqBubbles(){
  const w=document.getElementById("reqBubbles"); if(!w)return;

  w.innerHTML=editorState.requests.map((r,i)=>`<span class="bubble cat-${r.category}"><span class="cat">${esc(r.category)}</span> ${esc(r.item)} <span class="x" onclick="removeReq(${i})">×</span></span>`).join("");

async function commitOrder(isNew){
  const o=editorState;
  o.customer=(document.getElementById("eCust").value||"").trim();
  o.contact=(document.getElementById("eContact")?.value||"").trim();
  o.contactPhone=(document.getElementById("eContactPhone")?.value||"").trim();
  o.address=(document.getElementById("eAddress")?.value||"").trim();
  o.priority=document.getElementById("ePri").value;
  o.schedule=document.getElementById("eDate").value;
  o.notes=(document.getElementById("eNotes").value||"").trim();
  if(me.role==="customer") o.customer=me.businessName||o.customer;
  if(!o.customer) return toast("Please choose a customer");
  if(!o.requests.length) return toast("Add at least one request item");
  // derive title + items (keeps cards, calendar, invoice working)
  o.items=o.requests.map(r=>({name:r.item,category:r.category,qty:1,price:0}));
  o.title = o.requests.length===1 ? `${o.requests[0].category}: ${o.requests[0].item}`
            : `${o.requests.length} items — ${[...new Set(o.requests.map(r=>r.category))].join(", ")}`;
  if(me.role!=="customer"){
    o.assigneeName=document.getElementById("eAssignee").value;
    o.status=document.getElementById("eStatus").value;
    if(o.assigneeName&&o.status==="new")o.status="assigned";
  }else{ o.status="new"; o.assigneeName=o.assigneeName||""; }
  if(isNew){ o.id=FB_OK?null:newId("WO"); o.createdBy=me.uid; o.createdByName=me.name; o.role=me.role; o.order=orders.filter(x=>x.status===o.status).length; o.ts=Date.now(); }
  await saveOrder(o); closeModal(); toast(isNew?(me.role==="customer"?"Request submitted 🌿":"Work order created"):"Saved");
}

      </div></div>
      ${(o.contact||o.contactPhone||o.address)?`<div class="row2">
        ${(o.contact||o.contactPhone)?`<div class="sec"><div class="lbl">Contact</div><div class="val">${esc(o.contact||"—")}${o.contactPhone?`<br><a href="tel:${esc(o.contactPhone.replace(/[^0-9+]/g,''))}" style="color:var(--brand-deep);font-weight:700;text-decoration:none">📞 ${esc(o.contactPhone)}</a>`:""}</div></div>`:""}
        ${o.address?`<div class="sec"><div class="lbl">Location</div><div class="val">${esc(o.address)}</div></div>`:""}
      </div>`:""}
      <div class="row2">
        <div class="sec"><div class="lbl">Scheduled</div><div class="val">${o.schedule?fmtDate(o.schedule)+", "+new Date(o.schedule+"T00:00:00").getFullYear():"Unscheduled"}</div></div>
        <div class="sec"><div class="lbl">Order #</div><div class="val">${(o.id||"—").slice(0,10)}</div></div>
      </div>
      <div class="sec"><div class="lbl">Request</div><div class="bubbles">${bubbles}</div></div>
      ${o.notes?`<div class="sec"><div class="lbl">Additional info</div><div class="val">${esc(o.notes)}</div></div>`:""}
      ${o.completion?`<div class="sec"><div class="lbl">Completed — parts &amp; hours logged</div><div class="val" style="font-size:14.5px">${(o.completion.parts||[]).map(p=>`${esc(p.name)} ×${p.qty} @ ${money(p.cost)}`).join("<br>")||"No parts logged"}<br><b>${o.completion.hours||0} labor hour${o.completion.hours==1?"":"s"}</b>${o.completion.completedBy?" · by "+esc(o.completion.completedBy):""} ${o.invoiceStatus==="pending"?'<span class="pen-badge">Awaiting invoice</span>':o.invoiceStatus==="invoiced"?'<span class="status-pill done">Invoiced</span>':''}</div></div>`:""}
      ${me.role!=="customer"?`<div class="sec"><div class="lbl">Submitted by</div><div class="val">${esc(o.createdByName||"—")} (${o.role||"?"})</div></div>`:""}
      ${hasInv?`<div class="sec"><div class="lbl">Invoice</div><div class="val">${o.invoice.number} · ${money(o.invoice.total)} <button class="mini-btn" onclick="printInvoice('${o.id}')">Print</button></div></div>`:""}
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      ${(me.role!=="customer" && o.status!=="done")?`<button class="btn btn-primary" style="width:auto;padding:13px 20px;background:var(--ok)" onclick="closeModal();openCompletion('${o.id}')">Mark Complete</button>`:""}
      ${me.role==="admin"?`<button class="btn btn-accent" style="width:auto;padding:13px 22px" onclick="openInvoice('${o.id}')">${hasInv?"Edit Invoice":"Create Invoice"}</button>`:""}
      ${canEdit?`<button class="btn btn-primary" style="width:auto;padding:13px 22px" onclick="openEditor('${o.id}')">Edit</button>`:""}
    </div></div></div>`);
}

/* ============================================================
   COMPLETION WRAP-UP (technician) — parts + hours, no pricing
   ============================================================ */
let completionState=null;
function openCompletion(id){
  const o=getOrder(id); if(!o)return;
  completionState = o.completion ? JSON.parse(JSON.stringify(o.completion)) : {
    parts:[], hours:"", orderId:id
  };
  if(!completionState.parts.length) completionState.parts.push({name:"",qty:1,cost:""});
  renderCompletion(o);
}
function renderCompletion(o){
  const rows=completionState.parts.map((p,i)=>`
    <div class="part-row">
      <input value="${esc(p.name)}" placeholder="Part / material used" oninput="completionState.parts[${i}].name=this.value">
      <input type="number" min="1" value="${p.qty}" oninput="completionState.parts[${i}].qty=Math.max(1,+this.value||1)">
      <input type="number" min="0" step="0.01" value="${p.cost}" placeholder="$ each" oninput="completionState.parts[${i}].cost=this.value">
      <span class="rm" onclick="completionState.parts.splice(${i},1);renderCompletion(getOrder('${o.id}'))">×</span>
    </div>`).join("");
  mountModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-head"><h3>Wrap up: ${esc(o.title)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="sec"><div class="pill-row">
        <span class="cust-tag" style="background:${custColor(o.customer)};padding:5px 13px;border-radius:20px;color:#fff;font-weight:800;font-size:13px">${esc(o.customer||"—")}</span>
        <span class="tag">${esc(o.address||"")}</span>
      </div></div>
      <div class="field"><label>Parts &amp; materials used</label>
        <div class="builder">
          <div class="part-head"><span>Part</span><span>Qty</span><span>Cost ea.</span><span></span></div>
          <div id="partRows">${rows}</div>
          <div class="add-row" style="margin-top:6px"><button onclick="completionState.parts.push({name:'',qty:1,cost:''});renderCompletion(getOrder('${o.id}'))" style="background:var(--brand);color:#fff;border-radius:10px;padding:9px 16px;font-weight:800">+ Add part</button></div>
        </div>
        <div class="help">Just what you used and what it cost. The office sets pricing and builds the bill.</div>
      </div>
      <div class="field"><label>Labor hours</label>
        <div class="hours-box"><input type="number" min="0" step="0.25" id="compHours" value="${completionState.hours}" placeholder="0"><label>hours on the job</label></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" style="width:auto;padding:13px 24px" onclick="commitCompletion('${o.id}')">Mark Completed</button>
    </div></div></div>`);
}
async function commitCompletion(id){
  const o=getOrder(id); if(!o)return;
  completionState.hours=document.getElementById("compHours").value||"0";
  completionState.parts=completionState.parts.filter(p=>(p.name||"").trim());
  completionState.completedBy=me.name; completionState.completedTs=Date.now();
  o.completion=completionState;
  o.status="done";
  o.invoiceStatus = o.invoiceStatus==="invoiced" ? "invoiced" : "pending"; // enters the To-Invoice pen
  o.order=orders.filter(x=>x.status==="done").length;
  await saveOrder(o);
  closeModal(); toast("Job completed ✓ — sent to office for invoicing");
}

/* ============================================================
   TO INVOICE — holding pen (admin)
   ============================================================ */
function renderToInvoice(m){
  const pen=orders.filter(o=>o.status==="done" && o.completion && o.invoiceStatus!=="invoiced")
                  .sort((a,b)=>(a.completion?.completedTs||0)-(b.completion?.completedTs||0));
  const wrap=document.createElement("div");
  wrap.innerHTML=`<div class="view-title"><h2>To Invoice</h2><span class="count">${pen.length} waiting</span>
    <div class="sub">Completed jobs with the technician's parts &amp; hours logged, waiting for you to price and bill.</div></div>`;
  const list=document.createElement("div"); list.className="wo-list";
  if(!pen.length) list.innerHTML=`<div class="empty-col" style="padding:54px">Nothing waiting to invoice right now. 🌿</div>`;
  pen.forEach(o=>{
    const partsCost=(o.completion.parts||[]).reduce((s,p)=>s+(p.qty*(Number(p.cost)||0)),0);
    const row=document.createElement("div"); row.className="wo-row"; row.style.borderLeftColor=custColor(o.customer);
    row.innerHTML=`<div class="grow"><h4>${esc(o.title)} <span class="pen-badge">Ready to bill</span></h4>
      <div class="sub">${esc(o.customer||"—")} · ${(o.completion.parts||[]).length} part(s), parts cost ${money(partsCost)} · ${o.completion.hours||0} hr${o.completion.hours==1?"":"s"} · done by ${esc(o.completion.completedBy||"—")}</div></div>
      <button class="btn btn-accent" style="width:auto;padding:11px 20px" onclick="event.stopPropagation();openInvoice('${o.id}')">Create Invoice</button>`;
    row.onclick=()=>openDetail(o.id); list.appendChild(row);
  });
  wrap.appendChild(list); m.appendChild(wrap);
}

/* ============================================================
   INVOICE (admin) — build from work order + print
   ============================================================ */
function openInvoice(id){
  const o=getOrder(id); if(!o)return;
  if(o.invoice){
    invoiceState=JSON.parse(JSON.stringify(o.invoice));
  } else if(o.completion){
    // Build from the technician's wrap-up: parts (with their cost as a starting price) + a labor line.
    const items=(o.completion.parts||[]).map(p=>({name:p.name,qty:p.qty,price:Number(p.cost)||0}));
    if(Number(o.completion.hours)>0) items.push({name:`Labor — ${o.completion.hours} hr${o.completion.hours==1?"":"s"}`,qty:Number(o.completion.hours),price:0});
    invoiceState={ number:newId("INV"), orderId:o.id, customer:o.customer, items, taxRate:DEFAULT_TAX, notes:"", createdTs:Date.now() };
  } else {
    invoiceState={ number:newId("INV"), orderId:o.id, customer:o.customer,
      items:(o.items||[]).map(i=>({name:i.name,qty:i.qty,price:Number(i.price)||0})),
      taxRate:DEFAULT_TAX, notes:"", createdTs:Date.now() };
  }
  renderInvoiceModal(o);
}
function renderInvoiceModal(o){
  const rows=invoiceState.items.map((it,i)=>`
    <div class="chip"><input class="qty" type="number" min="1" value="${it.qty}" onchange="invoiceState.items[${i}].qty=Math.max(1,+this.value||1);recalcInv()">
      <span class="nm">${esc(it.name)}</span>
      <input class="price" type="number" min="0" step="0.01" value="${it.price}" placeholder="$ each" onchange="invoiceState.items[${i}].price=+this.value||0;recalcInv()">
      <button class="rm" onclick="invoiceState.items.splice(${i},1);renderInvoiceModal(getOrder('${o.id}'))">×</button></div>`).join("")||`<div class="empty-mini">No line items.</div>`;
  mountModal(`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <div class="modal-head"><h3>Invoice ${esc(invoiceState.number)}</h3><button class="x" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="sec"><div class="lbl">Bill to</div><div class="val" style="font-weight:800">${esc(o.customer||"—")}</div></div>
      ${o.completion?`<div class="sec" style="background:var(--honey-soft);border:1px solid #E8D9B0;border-radius:12px;padding:12px 14px">
        <div class="lbl" style="color:#7a5a14">Technician logged</div>
        <div class="val" style="font-size:14px">${(o.completion.parts||[]).map(p=>`${esc(p.name)} ×${p.qty} @ ${money(p.cost)}`).join("<br>")||"No parts"}<br><b>${o.completion.hours||0} labor hour${o.completion.hours==1?"":"s"}</b> · by ${esc(o.completion.completedBy||"—")}</div>
      </div>`:""}
      <div class="field"><label>Line items &amp; pricing</label><div class="builder"><div class="chips" id="invChips">${rows}</div>
        <div class="add-row" style="margin-top:12px"><input id="addLineName" placeholder="Add a line (e.g. Labor — 2 hrs)" style="flex:1;background:var(--bg-2);border:1px solid var(--line-2);border-radius:11px;padding:11px"><button onclick="addInvLine('${o.id}')">+</button></div></div></div>
      <div class="row2">
        <div class="field"><label>Tax rate (%)</label><input id="invTax" type="number" min="0" step="0.1" value="${invoiceState.taxRate}" onchange="invoiceState.taxRate=+this.value||0;recalcInv()"></div>
        <div class="field"><label>Invoice #</label><input id="invNum" value="${esc(invoiceState.number)}" onchange="invoiceState.number=this.value"></div>
      </div>
      <div class="field"><label>Notes on invoice</label><textarea id="invNotes" rows="2" placeholder="Thank you for your business!">${esc(invoiceState.notes||"")}</textarea></div>
      <div class="inv-tot" id="invTotals"></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-ghost" onclick="saveInvoice('${o.id}')">Save</button>
      <button class="btn btn-accent" style="width:auto;padding:13px 22px" onclick="saveInvoice('${o.id}',true)">Save &amp; Print</button>
    </div></div></div>`);
  recalcInv();
}
function addInvLine(orderId){
  const el=document.getElementById("addLineName"); const n=el.value.trim(); if(!n)return;
  invoiceState.items.push({name:n,qty:1,price:0}); renderInvoiceModal(getOrder(orderId));
}
function invTotals(){
  const sub=invoiceState.items.reduce((s,i)=>s+(i.qty*(Number(i.price)||0)),0);
  const tax=sub*(Number(invoiceState.taxRate)||0)/100; return {sub,tax,total:sub+tax};
}
function recalcInv(){
  const t=invTotals(); const el=document.getElementById("invTotals"); if(!el)return;
  el.innerHTML=`<div class="line"><span>Subtotal</span><span>${money(t.sub)}</span></div>
    <div class="line"><span>Tax (${invoiceState.taxRate||0}%)</span><span>${money(t.tax)}</span></div>
    <div class="line grand"><span>Total</span><span>${money(t.total)}</span></div>`;
}
async function saveInvoice(orderId,print){
  const o=getOrder(orderId); if(!o)return;
  invoiceState.notes=(document.getElementById("invNotes")||{}).value||invoiceState.notes;
  const t=invTotals(); invoiceState.subtotal=t.sub; invoiceState.tax=t.tax; invoiceState.total=t.total;
  o.invoice=invoiceState; o.invoiceStatus="invoiced"; await saveOrder(o);
  toast("Invoice saved — cleared from To Invoice");
  if(print) printInvoice(orderId); else { closeModal(); openDetail(orderId); }
}
function printInvoice(orderId){
  const o=getOrder(orderId); const inv=o.invoice||invoiceState; if(!inv)return;
  const t={sub:inv.subtotal??invTotals().sub,tax:inv.tax??invTotals().tax,total:inv.total??invTotals().total};
  const date=new Date(inv.createdTs||Date.now()).toLocaleDateString();
  const rows=inv.items.map(i=>`<tr><td>${esc(i.name)}</td><td style="text-align:center">${i.qty}</td><td style="text-align:right">${money(i.price)}</td><td style="text-align:right">${money(i.qty*(Number(i.price)||0))}</td></tr>`).join("");
  const html=`<!doctype html><html><head><meta charset="utf-8"><title>Invoice ${esc(inv.number)}</title>
    <style>
      body{font-family:'Nunito Sans',Arial,sans-serif;color:#34382C;max-width:720px;margin:32px auto;padding:0 24px}
      .top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #5E7C57;padding-bottom:18px;margin-bottom:24px}
      .co{font-family:Georgia,serif;font-size:26px;color:#41603C;font-weight:700}
      .co small{display:block;font-family:Arial;font-size:11px;letter-spacing:2px;color:#C2724E;text-transform:uppercase;margin-top:2px}
      h1{font-size:30px;color:#5E7C57;margin:0}
      .meta{color:#646856;font-size:14px;text-align:right;line-height:1.6}
      .bill{margin-bottom:20px;font-size:15px}.bill b{color:#646856;font-size:12px;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px}
      table{width:100%;border-collapse:collapse;margin-bottom:16px}
      th{background:#EAF0E4;text-align:left;padding:11px;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#41603C}
      th:nth-child(2){text-align:center}th:nth-child(3),th:nth-child(4){text-align:right}
      td{padding:11px;border-bottom:1px solid #E0DCCB;font-size:14.5px}
      .tot{margin-left:auto;width:280px}.tot .l{display:flex;justify-content:space-between;padding:6px 0;font-size:15px}
      .tot .g{font-family:Georgia,serif;font-size:22px;font-weight:700;color:#41603C;border-top:2px solid #5E7C57;margin-top:6px;padding-top:10px}
      .notes{margin-top:26px;color:#646856;font-size:14px;border-top:1px solid #E0DCCB;padding-top:14px}
      @media print{.noprint{display:none}body{margin:0}}
    </style></head><body>
    <div class="top"><div><div class="co">Gurnee Maintenance<small>Work Orders</small></div></div>
      <div><h1>INVOICE</h1><div class="meta"># ${esc(inv.number)}<br>${date}</div></div></div>
    <div class="bill"><b>Bill To</b>${esc(inv.customer||o.customer||"—")}</div>
    <table><thead><tr><th>Description</th><th>Qty</th><th>Unit Price</th><th>Amount</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="tot"><div class="l"><span>Subtotal</span><span>${money(t.sub)}</span></div>
      <div class="l"><span>Tax (${inv.taxRate||0}%)</span><span>${money(t.tax)}</span></div>
      <div class="l g"><span>Total Due</span><span>${money(t.total)}</span></div></div>
    ${inv.notes?`<div class="notes">${esc(inv.notes)}</div>`:""}
    <button class="noprint" onclick="window.print()" style="margin-top:30px;padding:12px 24px;background:#5E7C57;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer">Print / Save PDF</button>
    </body></html>`;
  const w=window.open("","_blank"); if(!w){toast("Allow pop-ups to print the invoice");return;}
  w.document.write(html); w.document.close();
}

/* ============================================================
   UTIL
   ============================================================ */
function mountModal(html){ closeModal(); const d=document.createElement("div"); d.id="modalRoot"; d.innerHTML=html; document.body.appendChild(d); }
function closeModal(){ const r=document.getElementById("modalRoot"); if(r)r.remove(); }
function esc(s){ return (s??"").toString().replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
let toastT=null; function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),2200); }
</script>
</body>
</html>
